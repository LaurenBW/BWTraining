<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BruntWork CSM — Team Relationship Hub</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #ffffff;
    color: #1a1a1a;
    padding: 24px 20px 32px;
    max-width: 860px;
    margin: 0 auto;
    font-size: 14px;
    line-height: 1.5;
  }

  h1 {
    font-size: 18px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 4px;
  }
  .subtitle {
    font-size: 13px;
    color: #666;
    margin-bottom: 18px;
  }

  /* Legend */
  .legend {
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #555;
  }

  /* SVG hub */
  .hub-wrap { width: 100%; }
  svg { width: 100%; height: auto; display: block; }
  .node { cursor: pointer; }
  .node:hover rect, .node:hover circle { opacity: 0.85; }

  /* Detail panel */
  #detail {
    margin-top: 14px;
    min-height: 90px;
    padding: 18px 22px;
    border: 1px solid #e8e8e8;
    border-radius: 12px;
    background: #f8f8f8;
    transition: background 0.2s;
  }
  .detail-placeholder {
    text-align: center;
    color: #aaa;
    font-size: 14px;
    padding: 18px 0;
  }
  .detail-header {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 10px;
    padding-bottom: 10px;
    border-bottom: 1px solid #e8e8e8;
  }
  .detail-name {
    font-size: 15px;
    font-weight: 600;
    color: #1a1a1a;
  }
  .freq-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    border: 1px solid rgba(0,0,0,0.08);
  }
  .freq-daily    { background: #E1F5EE; color: #0F6E56; }
  .freq-regular  { background: #EEEDFE; color: #3C3489; }
  .freq-occasional { background: #FAEEDA; color: #854F0B; }
  .freq-rare     { background: #F1EFE8; color: #5F5E5A; }
  .freq-own      { background: #EEEDFE; color: #3C3489; }

  .detail-role {
    font-size: 13px;
    color: #444;
    margin-bottom: 14px;
    line-height: 1.6;
  }
  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 0;
  }
  @media (max-width: 520px) {
    .detail-grid { grid-template-columns: 1fr; }
  }
  .detail-card {
    padding: 12px;
    border: 1px solid #e8e8e8;
    border-radius: 8px;
    background: #ffffff;
  }
  .detail-card-label {
    font-size: 10px;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 5px;
    font-weight: 600;
  }
  .detail-card-body {
    font-size: 13px;
    color: #1a1a1a;
    line-height: 1.55;
  }
  .detail-note {
    margin-top: 12px;
    padding: 10px 14px;
    background: #EEF6FF;
    border-left: 3px solid #378ADD;
    border-radius: 0 8px 8px 0;
    font-size: 13px;
    color: #0C447C;
    line-height: 1.55;
  }
</style>
</head>
<body>

<h1>BruntWork CSM — Team Relationship Hub</h1>
<p class="subtitle">Click any team to understand how it connects to your role as a Client Success Manager.</p>

<div class="legend">
  <div class="legend-item">
    <svg width="22" height="4" viewBox="0 0 22 4"><line x1="0" y1="2" x2="22" y2="2" stroke="#1D9E75" stroke-width="2.5"/></svg>
    Daily
  </div>
  <div class="legend-item">
    <svg width="22" height="3" viewBox="0 0 22 3"><line x1="0" y1="1.5" x2="22" y2="1.5" stroke="#7F77DD" stroke-width="1.5"/></svg>
    Regular
  </div>
  <div class="legend-item">
    <svg width="24" height="3" viewBox="0 0 24 3"><line x1="0" y1="1.5" x2="24" y2="1.5" stroke="#BA7517" stroke-width="1" stroke-dasharray="5 3"/></svg>
    Occasional
  </div>
  <div class="legend-item">
    <svg width="24" height="3" viewBox="0 0 24 3"><line x1="0" y1="1.5" x2="24" y2="1.5" stroke="#888780" stroke-width="0.8" stroke-dasharray="3 4"/></svg>
    Rare
  </div>
</div>

<div class="hub-wrap">
<svg viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="CSM team relationship hub diagram">

  <!-- Connector lines — drawn first so nodes sit on top -->
  <line x1="340" y1="260" x2="165" y2="260" stroke="#1D9E75" stroke-width="2.5"/>
  <line x1="340" y1="260" x2="340" y2="80"  stroke="#7F77DD" stroke-width="1.5"/>
  <line x1="340" y1="260" x2="460" y2="131" stroke="#7F77DD" stroke-width="1.5"/>
  <line x1="340" y1="260" x2="510" y2="260" stroke="#7F77DD" stroke-width="1.5"/>
  <line x1="340" y1="260" x2="220" y2="131" stroke="#7F77DD" stroke-width="1.5"/>
  <line x1="340" y1="260" x2="460" y2="389" stroke="#BA7517" stroke-width="1"   stroke-dasharray="5 4"/>
  <line x1="340" y1="260" x2="340" y2="445" stroke="#BA7517" stroke-width="1"   stroke-dasharray="5 4"/>
  <line x1="340" y1="260" x2="205" y2="389" stroke="#888780" stroke-width="0.8" stroke-dasharray="3 5"/>

  <!-- CSM centre -->
  <g class="node" onclick="showTeam('csm')">
    <circle cx="340" cy="260" r="42" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
    <text x="340" y="255" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#2C2C2A">CSM</text>
    <text x="340" y="272" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#888780">You are here</text>
  </g>

  <!-- N: CS Team -->
  <g class="node" onclick="showTeam('cs-team')">
    <rect x="275" y="54" width="130" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
    <text x="340" y="73" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#26215C">CS Team</text>
    <text x="340" y="91" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">Your own team</text>
  </g>

  <!-- NE: Sales -->
  <g class="node" onclick="showTeam('sales')">
    <rect x="395" y="109" width="130" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
    <text x="460" y="131" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#26215C">Sales</text>
  </g>

  <!-- E: Finance & Admin -->
  <g class="node" onclick="showTeam('finance')">
    <rect x="445" y="238" width="130" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
    <text x="510" y="260" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#26215C">Finance &amp; Admin</text>
  </g>

  <!-- SE: Training & Compliance -->
  <g class="node" onclick="showTeam('training')">
    <rect x="395" y="363" width="130" height="52" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.8"/>
    <text x="460" y="382" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#412402">Training &amp;</text>
    <text x="460" y="400" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#412402">Compliance</text>
  </g>

  <!-- S: IT Support -->
  <g class="node" onclick="showTeam('it')">
    <rect x="275" y="423" width="130" height="44" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.8"/>
    <text x="340" y="445" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#412402">IT Support</text>
  </g>

  <!-- SW: Tech / Software Dev -->
  <g class="node" onclick="showTeam('tech')">
    <rect x="140" y="363" width="130" height="52" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
    <text x="205" y="382" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#2C2C2A">Tech /</text>
    <text x="205" y="400" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#2C2C2A">Software Dev</text>
  </g>

  <!-- W: Staff Services (DAILY) -->
  <g class="node" onclick="showTeam('staff-services')">
    <rect x="100" y="238" width="130" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.2"/>
    <text x="165" y="260" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#04342C">Staff Services</text>
  </g>

  <!-- NW: Recruitment -->
  <g class="node" onclick="showTeam('recruitment')">
    <rect x="155" y="109" width="130" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
    <text x="220" y="131" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#26215C">Recruitment</text>
  </g>

</svg>
</div>

<div id="detail">
  <p class="detail-placeholder">Click any team above to see how it connects to your CSM role</p>
</div>

<script>
const T = {
  csm: {
    name: 'You — Client Success Manager', freq: null, fk: null,
    role: 'You are the single point of contact between BruntWork and every client you manage. All other teams interact with your clients through you — nothing bypasses the CSM.',
    rel: 'You own the client relationship end-to-end, coordinating across all 7 departments. On average ~60 accounts per CSM. There is no clock-in — your output and integrity are what matter.',
    when: 'Escalation path: You → CSM Team Lead → Head of CS → CRO → CEO',
    note: null
  },
  'cs-team': {
    name: 'Client Success Team', freq: 'Your team', fk: 'own',
    role: 'Your own department. Ensures client satisfaction, retention, and growth through proactive relationship management and service excellence.',
    rel: 'Your Team Lead is your first escalation for any client issue and guides your daily shift. The QA Specialist monitors your calls and surfaces coaching opportunities. Churn Specialists manage cases you flag.',
    when: 'Daily with your TL · Weekly CS huddles · QA call reviews ongoing',
    note: 'Escalation path: You → TL → Head of CS → CRO → Winston. Always go to your TL first — never skip a level.'
  },
  'staff-services': {
    name: 'Staff Services', freq: 'Daily', fk: 'daily',
    role: 'Manages the full lifecycle of all BruntWork staff — payroll, attendance, benefits, wellness checks, contract renewals, and offboarding. One Staff Services Partner (SSP) is assigned per client.',
    rel: 'Your closest cross-functional partner. Critical rule: SSPs do NOT speak directly with clients — YOU are the bridge. You receive client instructions and pass them to the SSP. You coordinate almost every day on updates, attendance issues, and onboarding.',
    when: 'Almost daily — staff updates, attendance issues, onboarding coordination, client instructions, issue resolution',
    note: 'SSPs handle payroll, attendance & wellness only. They do NOT provide performance coaching — that is the client\'s responsibility. If a client asks you about coaching their staff, the answer is: the client does that directly.'
  },
  recruitment: {
    name: 'Recruitment (inc. Sourcing)', freq: 'Regular', fk: 'regular',
    role: 'Sources, screens, and hires talent for client-requested roles. Sourcing generates the pipeline via social channels and job boards. Operates across AU/NZ, UK/EU, and US/LATAM shifts.',
    rel: 'For existing clients — YOU are the job owner. You create the HubSpot deal and Zoho job, coordinate with recruitment, and facilitate client interviews yourself. For new clients, the Interview Coordinator (under Sales) manages the interview process.',
    when: 'Whenever a staffing need arises — new role, backfill, or replacement request',
    note: 'New client = Interview Coordinator owns the interview. Existing client = YOU own and run the interview process. This is one of the most important distinctions to learn early.'
  },
  sales: {
    name: 'Sales Team', freq: 'Regular', fk: 'regular',
    role: 'Drives new client acquisition via discovery calls, proposals, and negotiation. Includes Business Development Officers (pitching), Interview Coordinators / Talent Solutions (new-client interviews), and Sales Administrators (contracts).',
    rel: 'Sales hands a new client to you once the contract is signed and the HubSpot deal moves to "Onboarding". From that moment, the client relationship is 100% yours. Sales Admin writes all contracts — you do not.',
    when: 'On new client handovers · Weekly cross-department meetings',
    note: 'Once a client is handed over, Sales steps back completely. You own the relationship. Sales Admin handles all contract creation — never try to write or modify a contract yourself.'
  },
  finance: {
    name: 'Finance & Admin', freq: 'Regular', fk: 'regular',
    role: 'Manages billing, invoicing, collections, payroll, and budgeting. The Collections team tracks overdue client invoices and sends weekly reports directly to CSMs.',
    rel: 'You receive weekly overdue invoice reports from Collections. Because you have the client relationship, you are better placed than Collections to handle payment conversations diplomatically. You also coordinate for staff bonuses, pay increases, and invoice disputes.',
    when: 'Weekly overdue invoice reports · Ad hoc for invoice disputes, pricing questions, staff salary changes, bonus processing',
    note: 'You are the client-facing arm of Collections. Finance handles the numbers — you have the conversation. Never ignore an overdue invoice report, even if you think the client is reliable.'
  },
  training: {
    name: 'Training & Compliance', freq: 'Occasional', fk: 'occasional',
    role: 'Ensures workforce quality and regulatory compliance. Manages ISO 27001, HIPAA (required for US-shift clients), and SOC 2 certifications. Also delivers client-requested staff upskilling programmes.',
    rel: 'Two scenarios only: (1) Any security breach or incident must be reported immediately — the Head of Training & Compliance is the sole contact for all security incidents. (2) If a client requests upskilling for their staff, this team designs and delivers the learning journey.',
    when: 'Security incidents (report immediately) · When a client requests a staff upskilling programme',
    note: 'Any information security incident → report immediately to the Head of Training & Compliance. She is the sole contact. All reports are confidential. Do not try to handle security incidents yourself.'
  },
  it: {
    name: 'IT Support', freq: 'Occasional', fk: 'occasional',
    role: 'Runs 24/7 IT operations — equipment procurement, software access, security tools, and technical support for all internal and outsourced staff.',
    rel: 'If your client needs IT support for their staff — new equipment, software access, or security software — you coordinate the request through IT. IT does not communicate directly with your clients. You remain the bridge.',
    when: 'Occasional — when clients raise IT needs for their staff, or when your own tools need attention',
    note: 'Available 24/7. Raise IT requests through your designated support space. IT is one of the few teams you can reach around the clock if a client has an urgent technical issue.'
  },
  tech: {
    name: 'Tech / Software Dev', freq: 'Rare', fk: 'rare',
    role: 'Builds and maintains BruntWork\'s internal platforms — the timekeeping system, Client Portal, Admin Portal, and internal automations. Has grown significantly as BruntWork scales.',
    rel: 'Your interaction is rare — only when a client needs a platform customisation or an internal tool needs a new feature. Always escalate through your TL rather than approaching Tech directly.',
    when: 'Rare — only for platform customisation requests escalated from clients',
    note: 'Always go via your CSM Team Lead if a client needs something custom-built. Do not contact the Tech team directly — requests need to be assessed and prioritised centrally first.'
  }
};

function showTeam(id) {
  const t = T[id];
  if (!t) return;
  const badge = t.freq
    ? `<span class="freq-badge freq-${t.fk}">${t.freq}</span>` : '';
  const note = t.note
    ? `<div class="detail-note">${t.note}</div>` : '';
  document.getElementById('detail').innerHTML = `
    <div class="detail-header">
      <span class="detail-name">${t.name}</span>${badge}
    </div>
    <p class="detail-role">${t.role}</p>
    <div class="detail-grid">
      <div class="detail-card">
        <div class="detail-card-label">Your relationship</div>
        <div class="detail-card-body">${t.rel}</div>
      </div>
      <div class="detail-card">
        <div class="detail-card-label">When you interact</div>
        <div class="detail-card-body">${t.when}</div>
      </div>
    </div>
    ${note}`;
}
</script>
</body>
</html>
